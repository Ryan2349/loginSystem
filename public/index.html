<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶註冊與登入系統</title>
</head>
<body>
    <h1>用戶註冊與登入系統</h1>

    <h2>註冊新用戶</h2>
    <form action="/register" method="POST">
        <label for="reg-username">用戶名:</label><br>
        <input type="text" id="reg-username" name="username" required><br><br>
        
        <label for="reg-password">密碼:</label><br>
        <input type="password" id="reg-password" name="password" required><br><br>
        
        <input type="submit" value="註冊">
    </form>

    <hr>

    <h2>用戶登入</h2>
    <form action="/login" method="POST">
        <label for="login-username">用戶名:</label><br>
        <input type="text" id="login-username" name="username" required><br><br>
        
        <label for="login-password">密碼:</label><br>
        <input type="password" id="login-password" name="password" required><br><br>
        
        <input type="submit" value="登入">
    </form>
</body>
</html>
